apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/0x746172656b/homelab
    targetRevision: main
    path: nextcloud
  destination:
    server: https://kubernetes.default.svc
    namespace: nextcloud
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
