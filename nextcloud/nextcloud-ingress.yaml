apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nextcloud-app
  namespace: nextcloud
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`nextcloud.local.khider.fr`)
      kind: Rule
      services:
        - name: nextcloud-app
          port: 8080  
  tls:
    secretName: nextcloud-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nextcloud.local.khider.fr-cert
  namespace: nextcloud
spec:
  secretName: nextcloud-cert
  issuerRef:
    name: cloudflare-issuer
    kind: ClusterIssuer
  dnsNames:
    - nextcloud.local.khider.fr
