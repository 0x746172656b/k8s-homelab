apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: qbittorrent-ingress-route
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`qbittorrent.local.khider.fr`)
      services:
        - name: qbittorrent
          port: 80
  tls:
    secretName: qbittorrent-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: qbittorrent.local.khider.fr-cert
  namespace: media
spec:
  secretName: qbittorrent-cert
  issuerRef:
    name: cloudflare-issuer
    kind: ClusterIssuer
  dnsNames:
    - qbittorrent.local.khider.fr
