apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-ingress-route
  namespace: traefik
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`traefik.local.khider.fr`) 
      services:
        - name: traefik
          port: 80
  tls:
    secretName: traefik-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik.local.khider.fr-cert
  namespace: traefik
spec:
  secretName: traefik-cert
  issuerRef:
    name: cloudflare-issuer
    kind: ClusterIssuer
  dnsNames:
    - traefik.local.khider.fr
