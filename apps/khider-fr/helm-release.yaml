# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: khider-fr
  namespace: web
spec:
  interval: 10m
  install:
    createNamespace: true
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    nameOverride: khider-fr-prod

    controllers:
      khider-fr:
        replicas: 2
        containers:
          main:
            image:
              repository: ghcr.io/0x746172656b/khider.fr
              tag: latest@sha256:12583ca982271710917f9e8e87905771159c2fe53248c7044f1069eaeae2d516
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
                add:
                  # Stock nginx image starts its master as root, chowns its
                  # cache dirs and drops workers to the nginx user (uid 101),
                  # and binds port 80. Those need these caps back.
                  - CHOWN
                  - SETUID
                  - SETGID
                  - NET_BIND_SERVICE

    defaultPodOptions:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    service:
      main:
        controller: khider-fr
        ports:
          http:
            port: 80

    ingress:
      main:
        enabled: false
