apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr-ingress-route
  namespace: media
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`sonarr.local.khider.fr`)
      services:
        - name: sonarr-prod
          port: 8989
  tls:
    secretName: sonarr-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sonarr.local.khider.fr-cert
  namespace: media
spec:
  secretName: sonarr-cert
  issuerRef:
    name: cloudflare-issuer
    kind: ClusterIssuer
  dnsNames:
    - sonarr.local.khider.fr
