# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json
app-template:
  controllers:
    sonarr:
      containers:
        main:
          image:
            repository: ghcr.io/linuxserver/sonarr
            tag: 4.0.17.2952-ls312
  defaultPodOptions:
    securityContext:
      seccompProfile:
        type: RuntimeDefault
  persistence:
    config:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 3Gi
    media:
      type: nfs
      server: 10.10.93.22
      path: /volume1/Jellyfin
      globalMounts: /data
  service:
    main:
      controller: sonarr
      ports:
        http:
          port: 8989
  ingress:
    main:
      enabled: false
